<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        padding: 20px;
        background: #f9f9f9;
        color: #333333;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        text-align: center;
        color: #000000;
      }

      .button-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 30px;
      }

      button {
        padding: 15px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        background: #000000;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      button:active {
        transform: scale(0.95);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }

      .log-container {
        background: #ffffff;
        border-radius: 12px;
        padding: 15px;
        max-height: 300px;
        overflow-y: auto;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .log-title {
        font-weight: 600;
        margin-bottom: 10px;
        color: #000000;
      }

      .log-entry {
        padding: 8px;
        margin: 5px 0;
        background: #f5f5f5;
        border-radius: 6px;
        font-size: 14px;
        border-left: 3px solid #000000;
      }

      .timestamp {
        color: #666666;
        font-size: 12px;
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Local Captions</h1>

    <div class="button-grid">
      <button onclick="sendMessage('button_1')">Button 1</button>
      <button onclick="sendMessage('button_2')">Button 2</button>
      <button onclick="sendMessage('button_3')">Button 3</button>
      <button onclick="sendMessage('button_4')">Button 4</button>
      <button onclick="requestData()">Request Data</button>
      <button onclick="sendCustomAction()">Custom Action</button>
    </div>

    <div class="log-container">
      <div class="log-title">Message Log</div>
      <div id="log"></div>
    </div>

    <!-- Load the MentraOS WebView SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@mentra/webview-sdk@latest/dist/index.js" type="module"></script>

    <!-- App Logic -->
    <script type="module">
      // Import SDK from CDN (or use bundled version)
      // For local development, you can use a bundler like Vite, Webpack, or Parcel
      // and import { CoreModule, Events } from '@mentra/webview-sdk'

      // For this example, the SDK is loaded globally via the script tag above
      // and auto-initializes, exposing window.CoreModule and window.Events

      // Wait for SDK to be available
      if (window.CoreModule && window.Events) {
        // Request online transcriptions with local fallback
        // Online transcriptions come from Soniox, local transcriptions use the on-device model
        // fallback: true means if online transcription fails, automatically use local model
        window.Events.requestTranscriptions(
          { type: "online", fallback: true },
          (text) => {
            console.log("Transcription:", text)
            window.CoreModule.displayText(text)
          }
        )

        // Example: Display text on glasses
        // window.CoreModule.displayText("Hello from WebView")

        // Example: Control microphone state
        // window.CoreModule.setMicState("on")

        // Example: Request audio stream
        // window.Events.requestAudio({ sampleRate: 16000 }, (audioData) => {
        //   console.log("Audio data:", audioData)
        // })

        // Example: Request movement/IMU data
        // window.Events.requestMovement({ frequency: 30 }, (movement) => {
        //   console.log("Movement:", movement.x, movement.y, movement.z)
        // })
      }
    </script>
  </body>
</html>
